# Standalone portfolio construction defaults (scripts/optimize_portfolio.py)
scheme: inverse_vol            # equal_weight | prediction_weighted | inverse_vol
max_weight: 0.10
max_gross_exposure: 1.0
max_net_exposure: 1.0
turnover_cap: 0.5
vol_lookback: 60
cash_buffer: 0.02              # fraction of capital held in cash
