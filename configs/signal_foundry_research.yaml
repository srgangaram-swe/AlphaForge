# Pre-registered Signal Foundry research and zero-capital paper-readiness rubric.
# Change this file only before creating a new immutable run identity. A final
# holdout result never authorizes live trading or implies future profitability.

research:
  holdout_start: "2024-01-02"
  benchmark_symbol: SPY
  target: fwd_ret_5
  horizons: [1, 5, 20]
  selection_metric: rank_ic
  seed: 42

readiness:
  rubric_version: "1.0.0"
  minimum_holdout_days: 252
  minimum_deflated_sharpe_probability: 0.95
  maximum_probability_of_backtest_overfitting: 0.50
  maximum_drawdown: 0.25
  minimum_annual_excess_return: 0.0
  maximum_average_turnover: 0.50
  require_complete_point_in_time: true

models:
  - name: zero_baseline
  - name: momentum_baseline
    params: {feature: momentum_20, scale: 0.05}
  - name: ridge
    params: {alpha: 10.0}
  - name: gradient_boosting
    params:
      max_iter: 200
      max_depth: 4
      learning_rate: 0.05
      l2_regularization: 1.0

features:
  return_lags: [1, 2, 3, 5, 10, 20]
  vol_windows: [5, 20, 60]
  ma_windows: [10, 20, 50, 200]
  momentum_windows: [20, 60, 120]
  rsi_window: 14
  macd: {fast: 12, slow: 26, signal: 9}
  bollinger_window: 20
  mean_reversion_window: 5
  volume_window: 20
  beta_window: 60
  rolling_sharpe_window: 60
  drawdown_window: 252
  regime_vol_window: 20
  regime_trend_fast: 50
  regime_trend_slow: 200
  hmm_regime: true
  hmm_refit_every: 63
  hmm_min_train: 252
  cross_sectional: true

walk_forward:
  scheme: expanding
  min_train_days: 756
  test_days: 126
  step_days: 126
  embargo_days: 21

backtest:
  strategy: long_short
  strategy_params: {quantile: 0.20}
  rebalance_frequency: 5
  execution_lag: 1
  liquidate_at_end: true
  initial_capital: 1000000
  execution:
    price_field: open
    adv_lookback: 20
    volatility_lookback: 20
    max_participation_rate: 0.05
    impact_coefficient: 0.10
    missing_price_policy: raise
  costs:
    commission_bps: 1.0
    half_spread_bps: 2.5
    slippage_bps: 2.0
  portfolio:
    max_weight: 0.20
    max_gross_exposure: 1.0
    max_net_exposure: 0.20
    inverse_vol_scaling: true
    turnover_cap: 0.50
  risk:
    vol_target: 0.10
    vol_lookback: 20
    max_leverage: 1.0
    drawdown_deleverage: 0.15
    drawdown_cut: 0.50
  capacity:
    aum_multiples: [0.5, 1.0, 2.0, 5.0, 10.0]
    max_participation_rate: 0.05
    minimum_fill_ratio: 0.95
  borrow_financing:
    short_borrow_bps_annual: 1000.0
    cash_financing_bps_annual: 500.0
