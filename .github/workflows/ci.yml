name: CI

on:
  push:
    branches: [main, dev, prod]
  pull_request:
    branches: [main, dev, prod]
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python 3.12
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: pip install -e ".[dev,data]"

      - name: Repository policy hooks
        run: pre-commit run --all-files

      - name: Type check (mypy)
        run: mypy alphaforge tests scripts apps

      - name: Build and install wheel
        run: |
          python -m build --wheel --sdist
          python -m venv /tmp/alphaforge-wheel-smoke
          /tmp/alphaforge-wheel-smoke/bin/pip install --no-deps dist/*.whl
          /tmp/alphaforge-wheel-smoke/bin/python -c "import alphaforge; assert alphaforge.__version__ == '0.2.1'"

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install
        run: pip install -e ".[dev,data,torch]"

      - name: Build C++ execution core
        run: python scripts/build_native.py

      - name: Tests (network tests excluded; includes C++/Python parity)
        run: pytest -m "not network" --cov=alphaforge --cov-branch --cov-report=term-missing --cov-fail-under=78

  smoke-demo:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: pip install -e .
      - name: End-to-end synthetic pipeline
        run: |
          python scripts/run_walk_forward.py --synthetic --fast
          python scripts/run_backtest.py --latest
          python scripts/generate_report.py

  container:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Build hardened data-excluding image
        run: docker build --tag alphaforge:ci .
      - name: Verify package and native core
        run: |
          docker run --rm --entrypoint python alphaforge:ci -c \
            "import alphaforge; from alphaforge.execution import NATIVE_AVAILABLE; assert alphaforge.__version__ == '0.2.1'; assert NATIVE_AVAILABLE"
