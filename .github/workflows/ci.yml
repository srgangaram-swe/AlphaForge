name: CI

on:
  push:
    branches: [main, dev, prod]
  pull_request:
    branches: [main, dev, prod]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install
        run: pip install -e ".[dev]"

      - name: Build C++ execution core
        run: python scripts/build_native.py

      - name: Lint (ruff)
        run: ruff check alphaforge tests scripts apps

      - name: Format check (black)
        run: black --check alphaforge tests scripts apps

      - name: Tests (network tests excluded; includes C++/Python parity)
        run: pytest -m "not network" --cov=alphaforge --cov-report=term-missing

  smoke-demo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: pip install -e .
      - name: End-to-end synthetic pipeline
        run: |
          python scripts/run_walk_forward.py --synthetic --fast
          python scripts/run_backtest.py --latest
          python scripts/generate_report.py
